<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>osu!mania Dan Acc Calculator</title>
    <style>
        /* Базовые стили */
        body {
            background-color: #121212;
            color: #d1d1d1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* Общий контейнер для калькулятора и боковой панели */
        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            align-items: flex-start;
        }

        /* Блок калькулятора */
        .container {
            background-color: #1e1e24;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            flex-grow: 1;
        }

        /* Боковая панель для кнопок */
        .sidebar {
            background-color: #1e1e24;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        h3 {
            color: #ff66aa;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.1em;
            text-align: left;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .section-title {
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        /* Строка с вводом данных */
        .map-row {
            display: flex;
            align-items: center;
            background: #25252b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #333;
            gap: 15px;
        }

        /* Цветные плашки */
        .badge {
            font-size: 0.7em;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            width: 60px;
            text-align: center;
            color: #fff;
        }
        .b-jack { background-color: #7b2cbf; }
        .b-tech { background-color: #0077b6; }
        .b-speed { background-color: #b8860b; }
        .b-stamina { background-color: #2d6a4f; }

        /* Группы ввода */
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        label {
            font-size: 0.75em;
            color: #aaa;
            margin-bottom: 5px;
        }

        input {
            width: 90%;
            padding: 8px;
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1em;
        }
        input:focus { outline: 1px solid #ff66aa; }

        /* Кнопка "ПОСЧИТАТЬ" */
        .calc-btn {
            width: 100%;
            padding: 15px;
            background-color: #ff66aa;
            border: none;
            color: #121212;
            font-weight: bold;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .calc-btn:hover { background-color: #ff88bb; }

        /* Кнопки в боковой панели */
        .preset-btn {
            background: #2a2a32;
            color: #ccc;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-family: monospace;
            font-size: 0.9em;
            transition: 0.2s;
        }
        .preset-btn:hover {
            background: #3a3a45;
            color: #ff66aa;
            border-color: #ff66aa;
        }

        /* Блок результатов */
        #results {
            margin-top: 30px;
            display: none;
        }
        .res-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #25252b;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #333;
        }
        .res-val {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1em;
        }
        .c-jack { color: #d0a5f5; }
        .c-tech { color: #90e0ef; }
        .c-speed { color: #ffe6a7; }
        .c-stamina { color: #b7e4c7; }

        #jumpscare {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: black;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #jumpscare img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes shake {
            0%   { transform: translate(1px, 1px) rotate(0deg); }
            10%  { transform: translate(-1px, -2px) rotate(-1deg); }
            20%  { transform: translate(-3px, 0px) rotate(1deg); }
            30%  { transform: translate(3px, 2px) rotate(0deg); }
            40%  { transform: translate(1px, -1px) rotate(1deg); }
            50%  { transform: translate(-1px, 2px) rotate(-1deg); }
            60%  { transform: translate(-3px, 1px) rotate(0deg); }
            70%  { transform: translate(3px, 1px) rotate(-1deg); }
            80%  { transform: translate(-1px, -1px) rotate(1deg); }
            90%  { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

    </style>
</head>
<body>

<div id="jumpscare">
    <img src="https://mathhulk.github.io/pnrtscr.com/images/jeff.jpg" alt="Scare">
</div>

<div class="main-wrapper">
    <div class="container">
        <h3>// osu!mania Dan — Калькулятор аккуратности</h3>

        <div class="section-title">ДАННЫЕ ПО КАРТАМ</div>

        <div class="map-row">
            <span class="badge b-jack">ДЖЕКИ</span>
            <div class="input-group">
                <label>Ноты</label>
                <input type="number" id="n1">
            </div>
            <div class="input-group">
                <label>Акк после (%)</label>
                <input type="number" id="a1" step="0.01">
            </div>
        </div>

        <div class="map-row">
            <span class="badge b-tech">ТЕХНО</span>
            <div class="input-group">
                <label>Ноты</label>
                <input type="number" id="n2">
            </div>
            <div class="input-group">
                <label>Акк после (%)</label>
                <input type="number" id="a2" step="0.01">
            </div>
        </div>

        <div class="map-row">
            <span class="badge b-speed">СПИД</span>
            <div class="input-group">
                <label>Ноты</label>
                <input type="number" id="n3">
            </div>
            <div class="input-group">
                <label>Акк после (%)</label>
                <input type="number" id="a3" step="0.01">
            </div>
        </div>

        <div class="map-row">
            <span class="badge b-stamina">СТАМИНА</span>
            <div class="input-group">
                <label>Ноты</label>
                <input type="number" id="n4">
            </div>
            <div class="input-group">
                <label>Акк после (%)</label>
                <input type="number" id="a4" step="0.01">
            </div>
        </div>

        <button class="calc-btn" onclick="calculate()">ПОСЧИТАТЬ</button>

        <div id="results">
            <div class="section-title">ИНДИВИДУАЛЬНАЯ АККУРАТНОСТЬ</div>
            <div class="res-row"><span class="badge b-jack">ДЖЕКИ</span> <span id="r1" class="res-val c-jack">-</span></div>
            <div class="res-row"><span class="badge b-tech">ТЕХНО</span> <span id="r2" class="res-val c-tech">-</span></div>
            <div class="res-row"><span class="badge b-speed">СПИД</span> <span id="r3" class="res-val c-speed">-</span></div>
            <div class="res-row"><span class="badge b-stamina">СТАМИНА</span> <span id="r4" class="res-val c-stamina">-</span></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="section-title" style="margin-top: 0;">ПРЕСЕТЫ НОТ</div>
        <button class="preset-btn" onclick="fillNotes('dan1')">dan 1st</button>
        <button class="preset-btn" onclick="fillNotes('dan2')">dan 2nd</button>
        <button class="preset-btn" onclick="fillNotes('dan3')">dan 3rd</button>
        <button class="preset-btn" onclick="fillNotes('dan4')">dan 4th</button>
        <button class="preset-btn" onclick="fillNotes('dan5')">dan 5th</button>
        <button class="preset-btn" onclick="fillNotes('dan6')">dan 6th</button>
        <button class="preset-btn" onclick="fillNotes('dan7')">dan 7th</button>
        <button class="preset-btn" onclick="fillNotes('dan8')">dan 8th</button>
        <button class="preset-btn" onclick="fillNotes('dan9')">dan 9th</button>
        <button class="preset-btn" onclick="fillNotes('dan10')">dan 10th</button>
        <button class="preset-btn" onclick="fillNotes('alpha')">alpha</button>
        <button class="preset-btn" onclick="fillNotes('beta')">beta</button>
        <button class="preset-btn" onclick="fillNotes('gamma')">gamma</button>
        <button class="preset-btn" onclick="fillNotes('delta')">delta</button>
        <button class="preset-btn" onclick="fillNotes('epsilon')">epsilon</button>
    </div>
</div>

<script>
// =====================================================================
// ТУТ ВВОДИТЬ КОЛИЧЕСТВО НОТ ДЛЯ ПРЕСЕТОВ
// Порядок: [Ноты Джеки, Ноты Техно, Ноты Спид, Ноты Стамина]
// Заменяй единички на реальные числа!
// =====================================================================
const danData = {
    'dan1': [878, 696, 954, 1167],
    'dan2': [1107, 905, 955, 1487],
    'dan3': [905, 797, 1047, 1259],
    'dan4': [980, 1499, 1283, 2071],
    'dan5': [1293, 1722, 1126, 1903],
    'dan6': [1487, 1266, 1378, 2186],
    'dan7': [2114, 1777, 1081, 2736],
    'dan8': [2117, 1309, 1608, 1589],
    'dan9': [2114, 2070, 1637, 2272],
    'dan10': [1906, 1460, 1723, 2392],
    'alpha': [2265, 1528, 2300, 3334],
    'beta': [2274, 2308, 1740, 2301],
    'gamma': [1973, 1980, 1429, 3979],
    'delta': [2018, 2711, 3268, 2629],
    'epsilon': [2128, 2552, 2194, 2829]
};
// =====================================================================

// Функция подстановки нот при нажатии на пресет
function fillNotes(danName) {
    const notes = danData[danName];
    if (notes) {
        document.getElementById('n1').value = notes[0];
        document.getElementById('n2').value = notes[1];
        document.getElementById('n3').value = notes[2];
        document.getElementById('n4').value = notes[3];
    }
}

// Основная функция калькулятора
function calculate() {
    function getInd(xPast, xNew, nPast, nNew) {
        if (!nNew) return 0;
        return (xNew * (nPast + nNew) - xPast * nPast) / nNew;
    }

    const n = [
        parseFloat(document.getElementById('n1').value) || 0,
        parseFloat(document.getElementById('n2').value) || 0,
        parseFloat(document.getElementById('n3').value) || 0,
        parseFloat(document.getElementById('n4').value) || 0
    ];
    const a = [
        parseFloat(document.getElementById('a1').value) || 0,
        parseFloat(document.getElementById('a2').value) || 0,
        parseFloat(document.getElementById('a3').value) || 0,
        parseFloat(document.getElementById('a4').value) || 0
    ];

    const res1 = a[0];
    const res2 = getInd(a[0], a[1], n[0], n[1]);
    const res3 = getInd(a[1], a[2], n[0] + n[1], n[2]);
    const res4 = getInd(a[2], a[3], n[0] + n[1] + n[2], n[3]);

    // ==========================================
    // ЛОВУШКА ДЛЯ ДРУГА (ВСТРОЕННАЯ)
    // ==========================================
    if (a.some(val => val > 100)) {
        document.getElementById('jumpscare').style.display = 'flex';
        let audio = new Audio('https://mathhulk.github.io/pnrtscr.com/audio/scream.mp3');
        audio.volume = 1.0;
        audio.play();
        document.body.style.animation = "shake 0.1s infinite";
        return;
    }
    // ==========================================

    document.getElementById('r1').innerText = (res1 > 0 ? res1.toFixed(2) + "%" : "-");
    document.getElementById('r2').innerText = (res2 > 0 ? res2.toFixed(2) + "%" : "-");
    document.getElementById('r3').innerText = (res3 > 0 ? res3.toFixed(2) + "%" : "-");
    document.getElementById('r4').innerText = (res4 > 0 ? res4.toFixed(2) + "%" : "-");

    document.getElementById('results').style.display = 'block';
}
</script>

</body>
</html>
